<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of Leba</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* إضافة الماوس المخصص (فأس سكيلتون جاهز برابط مباشر) */
        * {
            cursor: url('https://api.iconify.design/game-icons/battered-axe.svg?color=white&width=32&height=32'), auto !important; 
        }

        /* الخلفية السوداء الصافية */
        body {
            margin: 0; padding: 0; background-color: #050505; color: #ffffff;
            font-family: 'Arial', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* شاشة الترحيب */
        #intro-screen {
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .typewriter {
            overflow: hidden;
            border-right: 2px solid #ffffff;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 2px;
            animation: typing 3s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #ffffff; } }

        #use-me-btn {
            margin-top: 40px; padding: 10px 30px; background: transparent; color: #ffffff;
            border: 1px solid #555555; font-size: 16px; letter-spacing: 2px;
            opacity: 0; transition: all 0.3s ease;
            animation: fadeIn 1s 3s forwards;
        }
        #use-me-btn:hover {
            border-color: #ffffff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.7);
            background-color: #ffffff;
            color: #000000;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* شاشة الحسابات والنجوم */
        #links-screen {
            display: none;
            width: 100%; height: 100%; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }

        /* النجوم البيضاء المتحركة (لا نهائية) */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #dddddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #bbbbbb, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #cccccc, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: moveStars 10s linear infinite;
        }
        @keyframes moveStars { 
            from { background-position: 0 0; } 
            to { background-position: 0 -200px; } 
        }

        /* --- تصميم أزرار المزرعة الجديد --- */
        
        .social-link {
            z-index: 10; 
            margin: 15px; 
            text-decoration: none; color: #ffffff;
            width: 320px; height: 60px;
            display: flex; align-items: center;
            position: relative;
            background: #111111; 
            border: 3px solid #222222;
            border-radius: 10px;
            border-bottom: 4px solid #2d4a22; 
            transition: all 0.3s ease;
            padding-left: 70px; 
        }

        .social-link:hover {
            transform: translateY(-3px);
            border-color: #444;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            border-bottom: 4px solid #4a7c37; 
        }

        .link-content {
            display: flex; align-items: center; gap: 15px;
            font-weight: bold; letter-spacing: 1px; font-size: 18px;
        }

        /* تصميم الكوخ/المزرعة على اليسار */
        .barn-box {
            position: absolute;
            left: -15px; 
            bottom: 0;
            width: 65px; height: 75px;
            background: #2a1b14; 
            border: 3px solid #1a100c;
            border-radius: 5px 5px 0 0;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 5px;
            box-sizing: border-box;
            overflow: visible;
        }

        .barn-box::before {
            content: '';
            position: absolute;
            top: -25px; left: -10px;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 25px solid #1f140e;
        }

        /* تنسيق صور الحيوانات */
        .animal-img {
            width: 45px;
            height: 45px;
            z-index: 2;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.8));
        }

        /* فلتر لتحويل الخروف والدجاجة للون الأسود الكئيب */
        .dark-animal {
            filter: brightness(0.2) contrast(1.5) drop-shadow(2px 2px 2px rgba(0,0,0,0.8));
        }

        /* تنسيق السماعة فوق بقرة سبوتيفاي */
        .headphones {
            position: absolute;
            top: 20px;
            width: 30px;
            height: 30px;
            z-index: 3;
        }

    </style>
</head>
<body>

    <div id="intro-screen">
        <h2 class="typewriter">Welcome to the home of Leba</h2>
        <button id="use-me-btn" onclick="enterHome()">USE ME</button>
    </div>

    <div id="links-screen">
        <div class="stars"></div>
        
        <a href="https://discord.gg/9pkfZkHc" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f42e.png" class="animal-img" alt="Cow">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-discord"></i> Discord
            </div>
        </a>

        <a href="https://www.instagram.com/fh8e?igsh=MTd6bng4bG93bjJzeg==" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f411.png" class="animal-img dark-animal" alt="Black Sheep">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-instagram"></i> Instagram
            </div>
        </a>

        <a href="https://tellonym.me/xnmw" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f414.png" class="animal-img dark-animal" alt="Black Chicken">
            </div>
            <div class="link-content">
                <i class="fa-regular fa-comment-dots"></i> Tellonym
            </div>
        </a>

        <a href="https://open.spotify.com/user/31bo326itcsfmoutje4rxxata4ym?si=6pPjZDjiQomv2t_qZFlITQ" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f42e.png" class="animal-img" alt="Cow">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f3a7.png" class="headphones" alt="Headphones">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-spotify"></i> Spotify
            </div>
        </a>
    </div>

    <script>
        function enterHome() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('links-screen').style.display = 'flex';
        }
    </script>

</body>
</html>
