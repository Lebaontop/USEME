<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of Leba</title>
    
    <style>
        /* الخلفية والماوس المخصص */
        body {
            margin: 0; 
            padding: 0; 
            background-color: #050505; 
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
            /* مؤشر الماوس على شكل فأس، مع بديل افتراضي إذا لم يحمل */
            cursor: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Axe_icon_black.svg/32px-Axe_icon_black.svg.png'), auto; 
        }

        /* شبكة العوالم (4 غرف موزعة في الشاشة) */
        .world-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* التصميم الأساسي لكل غرفة */
        .room {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid #111; 
            transition: all 0.5s ease;
            background-size: cover;
            background-position: center;
            /* هذي الميزة تحول أي صورة لأسود وأبيض وتظلمها */
            filter: grayscale(100%) brightness(35%); 
        }

        /* تأثير التمرير (الماوس) على الغرفة */
        .room:hover {
            filter: grayscale(100%) brightness(85%); 
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9); 
        }

        /* اسم المنصة المخفي الذي يظهر عند التمرير */
        .room-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 3px 3px 15px #000000, -1px -1px 15px #000000;
            z-index: 2;
        }

        .room:hover .room-title {
            opacity: 1;
        }

        /* طبقة الضباب الوهمية فوق الصور */
        .fog-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 20%, #050505 95%);
            z-index: 1;
        }

        /* --- روابط الصور الواقعية --- */
        
        /* الانستقرام: كوخ خشبي مظلم في الغابة */
        #insta-room {
            background-image: url('https://images.unsplash.com/photo-1542459957-c584ebf5ebec?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); 
        }
        
        /* الديسكورد: برج اتصالات حديدي صارم */
        #discord-room {
            background-image: url('https://images.unsplash.com/photo-1563204780-b2cc1c002271?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); 
        }
        
        /* سبوتيفاي: أشجار ميتة ومرعبة */
        #spotify-room {
            background-image: url('https://images.unsplash.com/photo-1473656108169-25089f2a03ee?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); 
        }
        
        /* تيلونيوم: صندوق بريد قديم ومهجور */
        #tellonym-room {
            background-image: url('https://images.unsplash.com/photo-1522278453443-42e58c8ca5ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); 
        }
    </style>
</head>
<body>

    <div class="world-grid">
        
        <!-- غرفة الإنستقرام -->
        <a href="https://www.instagram.com/fh8e?igsh=MTd6bng4bG93bjJzeg==" target="_blank" class="room" id="insta-room">
            <div class="fog-overlay"></div>
            <div class="room-title">INSTAGRAM</div>
        </a>

        <!-- غرفة الديسكورد -->
        <a href="https://discord.gg/9pkfZkHc" target="_blank" class="room" id="discord-room">
            <div class="fog-overlay"></div>
            <div class="room-title">DISCORD</div>
        </a>

        <!-- غرفة سبوتيفاي -->
        <a href="https://open.spotify.com/user/31bo326itcsfmoutje4rxxata4ym?si=6pPjZDjiQomv2t_qZFlITQ" target="_blank" class="room" id="spotify-room">
            <div class="fog-overlay"></div>
            <div class="room-title">SPOTIFY</div>
        </a>

        <!-- غرفة تيلونيوم -->
        <a href="https://tellonym.me/xnmw" target="_blank" class="room" id="tellonym-room">
            <div class="fog-overlay"></div>
            <div class="room-title">TELLONYM</div>
        </a>

    </div>

</body>
</html>
