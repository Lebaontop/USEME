<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of Leba</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* الماوس: فأس سكيلتون */
        * {
            cursor: url('https://api.iconify.design/game-icons/battered-axe.svg?color=white&width=32&height=32'), auto !important; 
        }

        /* الخلفية */
        body {
            margin: 0; padding: 0; background-color: #050505; color: #ffffff;
            font-family: 'Arial', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* شاشة الترحيب */
        #intro-screen {
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .typewriter {
            overflow: hidden;
            border-right: 2px solid #ffffff;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 2px;
            animation: typing 3s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #ffffff; } }

        #use-me-btn {
            margin-top: 40px; padding: 10px 30px; background: transparent; color: #ffffff;
            border: 1px solid #555555; font-size: 16px; letter-spacing: 2px;
            opacity: 0; transition: all 0.3s ease;
            animation: fadeIn 1s 3s forwards;
            border-radius: 5px;
        }
        #use-me-btn:hover {
            border-color: #ffffff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.7);
            background-color: #ffffff;
            color: #000000;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* شاشة الحسابات والنجوم */
        #links-screen {
            display: none;
            width: 100%; height: 100%; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
            gap: 15px; /* مسافة متساوية بين الأزرار */
        }

        /* النجوم اللانهائية */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #dddddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #bbbbbb, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #cccccc, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: moveStars 10s linear infinite;
        }
        @keyframes moveStars { 
            from { background-position: 0 0; } 
            to { background-position: 0 -200px; } 
        }

        /* --- تصميم الأزرار الجديد والمطابق لصورتك --- */
        
        .social-link {
            z-index: 10; 
            text-decoration: none; color: #ffffff;
            width: 320px; height: 65px;
            display: flex; align-items: center;
            position: relative;
            background: #0f0f0f; /* لون أسود باهت */
            border: 4px solid #1a1a1a; /* إطار الزر */
            border-radius: 12px;
            /* خدعة العشب الأرضي داخل الزر */
            box-shadow: inset 0 -8px 0 0 #2a3b1d; 
            transition: all 0.3s ease;
            padding-left: 80px; 
            box-sizing: border-box;
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: #333;
            box-shadow: inset 0 -8px 0 0 #3e5e26, 0 5px 15px rgba(0,0,0,0.9);
        }

        .link-content {
            display: flex; align-items: center; gap: 15px;
            font-weight: bold; letter-spacing: 1px; font-size: 17px;
            margin-bottom: 5px; /* عشان يرتفع عن العشب */
        }

        /* الكوخ */
        .barn-box {
            position: absolute;
            left: -10px; 
            bottom: 7px; /* يجلس بالضبط فوق العشب */
            width: 75px; height: 75px;
            background: #2b1d16; /* خشب غامق */
            border: 4px solid #1a1a1a;
            border-radius: 4px;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 2px;
            box-sizing: border-box;
        }

        /* السقف الخارجي (الإطار الأسود) */
        .barn-box::before {
            content: '';
            position: absolute;
            top: -30px; left: -4px;
            border-left: 41px solid transparent;
            border-right: 41px solid transparent;
            border-bottom: 28px solid #1a1a1a;
        }

        /* السقف الداخلي (لون الخشب) */
        .barn-box::after {
            content: '';
            position: absolute;
            top: -21px; left: 3px;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 21px solid #3d291f;
        }

        /* فلتر كئيب وميت للألوان بس الملامح واضحة */
        .animal-img {
            width: 48px;
            height: 48px;
            z-index: 5;
            filter: grayscale(85%) brightness(80%) drop-shadow(2px 2px 2px rgba(0,0,0,0.8));
        }

        /* سماعات سبوتيفاي */
        .headphones {
            position: absolute;
            top: 15px;
            width: 32px;
            height: 32px;
            z-index: 6;
            filter: grayscale(100%);
        }

    </style>
</head>
<body>

    <div id="intro-screen">
        <h2 class="typewriter">Welcome to the home of Leba</h2>
        <button id="use-me-btn" onclick="enterHome()">USE ME</button>
    </div>

    <div id="links-screen">
        <div class="stars"></div>
        
        <a href="https://discord.gg/9pkfZkHc" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f42e.png" class="animal-img" alt="Cow">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-discord"></i> Discord
            </div>
        </a>

        <a href="https://www.instagram.com/fh8e?igsh=MTd6bng4bG93bjJzeg==" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f411.png" class="animal-img" alt="Sheep">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-instagram"></i> Instagram
            </div>
        </a>

        <a href="https://tellonym.me/xnmw" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f414.png" class="animal-img" alt="Chicken">
            </div>
            <div class="link-content">
                <i class="fa-regular fa-comment-dots"></i> Tellonym
            </div>
        </a>

        <a href="https://open.spotify.com/user/31bo326itcsfmoutje4rxxata4ym?si=6pPjZDjiQomv2t_qZFlITQ" class="social-link" target="_blank">
            <div class="barn-box">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f42e.png" class="animal-img" alt="Cow">
                <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f3a7.png" class="headphones" alt="Headphones">
            </div>
            <div class="link-content">
                <i class="fa-brands fa-spotify"></i> Spotify
            </div>
        </a>
    </div>

    <script>
        function enterHome() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('links-screen').style.display = 'flex';
        }
    </script>

</body>
</html>
